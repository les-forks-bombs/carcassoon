default:
  image: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image:latest # Public image with fedora & required build tools

.targets: &targets
  - x86_64-redhat-linux-gnu
  - x86_64-w64-mingw64
  - x86_64-w64-mingw32

.profiles: &profiles 
  - debug
  - release

stages:
  - build
  - test
  - docs
  - deploy

'Build':
  stage: build

  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles
  
  script:
    - make bear -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out/$PROFILE/$TARGET

'AppImage':
  stage: deploy
  needs:
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['x86_64-redhat-linux-gnu']
            PROFILE: ['release']

  script:
    - make appimage -j$(nproc) TARGET=x86_64-redhat-linux-gnu PROFILE=release

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out/$PROFILE/$TARGET/bin/*.AppImage

'Tidy':
  stage: test
  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles

  needs:
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['$[[ matrix.TARGET ]]']
            PROFILE: ['$[[ matrix.PROFILE ]]']

  script:
    - make tidy -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

'Coverage':
  stage: test
  needs:
    - job: 'Test'
      parallel:
        matrix:
          - TARGET: ['x86_64-redhat-linux-gnu']
            PROFILE: ['debug']
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['x86_64-redhat-linux-gnu']
            PROFILE: ['debug']

  script:
    - make coverage-xml -j$(nproc) TARGET=x86_64-redhat-linux-gnu PROFILE=debug
  
  coverage: '/TOTAL.*\s+(\d+\.\d+)\%/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ./out/debug/x86_64-redhat-linux-gnu/coverage.xml

'Test':
  stage: test
  needs:
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['$[[ matrix.TARGET ]]']
            PROFILE: ['$[[ matrix.PROFILE ]]']
  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles

  script:
    - make test -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out/$PROFILE/$TARGET/bin/*.xml
    reports:
      junit: ./out/$PROFILE/$TARGET/bin/*.xml

'Format':
  stage: test
  needs: []
  allow_failure: true
  script:
    - make format

'Docs':
  stage: docs
  needs: []
  allow_failure: true
  pages: true
  script:
    - make docs
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./public
