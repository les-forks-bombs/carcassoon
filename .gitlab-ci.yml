
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

default:
  image: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest

.targets: &targets
  - x86_64-pc-linux-gnu
  - x86_64-w64-mingw32
  - wasm32-unknown-emscripten

.profiles: &profiles 
  - debug
  - release

stages:
  - build
  - test
  - docs
  - deploy

'Build':
  stage: build

  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles
  
  script:
    - make all -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out/$PROFILE/$TARGET

'Tidy':
  stage: test
  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles

  needs:
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['$[[ matrix.TARGET ]]']
            PROFILE: ['$[[ matrix.PROFILE ]]']

  script:
    - make tidy -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

'Coverage':
  stage: test
  needs:
    - job: 'Test'
      parallel:
        matrix:
          - TARGET: ['x86_64-pc-linux-gnu']
            PROFILE: ['debug']
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['x86_64-pc-linux-gnu']
            PROFILE: ['debug']

  script:
    - make coverage-xml -j$(nproc) TARGET=x86_64-pc-linux-gnu PROFILE=debug
  
  coverage: '/TOTAL.*\s+(\d+\.\d+)\%/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ./out/debug/x86_64-pc-linux-gnu/coverage.xml

'Test':
  stage: test
  needs:
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['$[[ matrix.TARGET ]]']
            PROFILE: ['$[[ matrix.PROFILE ]]']
  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles

  script:
    - make test -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out/$PROFILE/$TARGET/bin/*.xml
    reports:
      junit: ./out/$PROFILE/$TARGET/bin/*.xml

'Format':
  stage: test
  needs: []
  allow_failure: true
  script:
    - make check

'Docs':
  stage: build
  needs: []
  script:
    - make docs
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./public/docs

'Aggregate':
  stage: deploy
  needs:
    - job: 'Build'
      parallel:
        matrix:
        - TARGET: *targets
          PROFILE: ['release']
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./out  


'Pages':
  stage: deploy
  needs:
    - job: 'Docs'
    - job: 'Aggregate'
    - job: 'Build'
      parallel:
        matrix:
          - TARGET: ['wasm32-unknown-emscripten']
            PROFILE: ['release']
  script:
    - rm -r out/release/wasm32-unknown-emscripten/bin/assets
    - cp out/release/wasm32-unknown-emscripten/bin/* public/
    - tar czf public/release.tar.gz out/release
    - sha256sum public/release.tar.gz > public/release.tar.gz.sha256

  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - ./public

  environment:
    name: "Pages ${PAGES_PREFIX}"
    url: $CI_PAGES_URL

  variables:
    PAGES_PREFIX: ""
  pages:
    path_prefix: "$PAGES_PREFIX"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      variables:
        PAGES_PREFIX: 'br-$CI_COMMIT_REF_SLUG'
