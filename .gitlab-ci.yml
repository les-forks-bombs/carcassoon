default:
  image: forgejo.puffer.fish/matthieu/base-images/fedora-c-build:latest # Public image with debian & required build tools

.targets: &targets
  - x86_64-redhat-linux-gnu
  - x86-redhat-linux-gnu
  - x86_64-w64-windows-gnu

.profiles: &profiles 
  - debug
  - release

stages:
  - build
  - test
  - docs

'Build':
  stage: build

  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles
  
  script:
    - make -s clean build -j$(nproc) TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    paths:
      - ./out/$PROFILE/$TARGET

'Test':
  stage: test

  parallel:
    matrix:
      - TARGET: *targets
        PROFILE: *profiles
  
  script:
    - make -s test TARGET=$TARGET PROFILE=$PROFILE

  artifacts:
    when: always
    paths:
      - ./out/$PROFILE/$TARGET/bin/tests/*.xml
    reports:
      junit: ./out/$PROFILE/$TARGET/bin/tests/*.xml

'Docs':
  stage: docs
  script:
    - make docs
  artifacts:
    when: always
    paths:
      - ./public
