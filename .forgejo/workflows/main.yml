name: CI Pipeline

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    strategy:
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make all -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}

  test:
    needs: build
    strategy:
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}
      - name: Tidy
        run: make tidy -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - name: Test
        run: make test -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}/bin/*.xml

  coverage:
    needs: [build, test]
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-debug
          path: ./out/debug/x86_64-pc-linux-gnu
      - name: Generate Coverage
        run: make coverage-xml -j$(nproc) TARGET=x86_64-pc-linux-gnu PROFILE=debug
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./out/debug/x86_64-pc-linux-gnu/coverage.xml

  format:
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Format Check
        run: make check

  docs:
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docs
        run: make docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: ./public/docs

  deploy:
    needs: [build, docs]
    runs-on: ubuntu-latest
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Aggregate and Prepare Pages
        run: |
          mkdir -p public
          # Download artifacts logic here
          # (Simplified for structure, ensure paths align with your build output)
          cp out/release/wasm32-unknown-emscripten/bin/* public/ || true
          tar czf public/release.tar.gz out/release
          sha256sum public/release.tar.gz > public/release.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ./public