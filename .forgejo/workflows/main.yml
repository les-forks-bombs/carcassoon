name: CI Pipeline

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    strategy:
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make all -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: forgejo/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}

  format:
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Format Check
        run: make check

  docs:
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docs
        run: make docs
      - uses: forgejo/upload-artifact@v4
        with:
          name: docs
          path: ./public/docs

  test:
    needs: build
    strategy:
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}
      - name: Tidy
        run: make tidy -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - name: Test
        run: make test -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}

  coverage:
    needs: build
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-debug
          path: ./out/debug/x86_64-pc-linux-gnu
      - name: Generate Coverage
        run: make coverage-xml -j$(nproc) TARGET=x86_64-pc-linux-gnu PROFILE=debug
      - uses: forgejo/upload-artifact@v4
        with:
          name: coverage-report
          path: ./out/debug/x86_64-pc-linux-gnu/coverage.xml

  deploy:
    needs: [build, docs]
    runs-on: mpgn
    container: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4

      - uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-debug
          path: ./out/debug/x86_64-pc-linux-gnu
      - uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-release
          path: ./out/release/x86_64-pc-linux-gnu
      - uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-w64-mingw32-debug
          path: ./out/debug/x86_64-w64-mingw32
      - uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-w64-mingw32-release
          path: ./out/release/x86_64-w64-mingw32
      - uses: forgejo/download-artifact@v4
        with:
          name: build-wasm32-unknown-emscripten-debug
          path: ./out/debug/wasm32-unknown-emscripten
      - uses: forgejo/download-artifact@v4
        with:
          name: build-wasm32-unknown-emscripten-release
          path: ./out/release/wasm32-unknown-emscripten

      - uses: forgejo/download-artifact@v4
        with:
          name: docs
          path: ./public/docs

      - name: Aggregate and Prepare Pages
        run: |
          mkdir -p public
          # Your aggregation logic here
          tar czf public/release.tar.gz out/release
          sha256sum public/release.tar.gz > public/release.tar.gz.sha256

      - uses: actions/git-pages@v2
        with:
          site: https://mpgn.pufferfish.page/tn-ppii
          server: pufferfish.page
          token: ${{ secrets.PAGES_TOKEN }}
          source: public/