name: CI Pipeline

on:
  push:
    branches: ['**']
    tags: ['*']
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix: &build-matrix
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: mpgn
    container: &ci-container forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-ubuntu:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make all -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: forgejo/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}

  format:
    runs-on: mpgn
    container: *ci-container
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Format Check
        run: make check

  docs:
    runs-on: mpgn
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - name: Build Docs
        run: make docs
      - uses: forgejo/upload-artifact@v4
        with:
          name: docs
          path: ./public/docs

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix: *build-matrix
    runs-on: mpgn
    container: *ci-container
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}
      - name: Tidy
        run: make tidy -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - name: Test
        run: make test -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: forgejo/upload-artifact@v4
        with:
          name: test-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out/${{ matrix.profile }}/${{ matrix.target }}

  coverage:
    needs: test
    runs-on: mpgn
    container: *ci-container
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: forgejo/download-artifact@v4
        with:
          name: test-x86_64-pc-linux-gnu-debug
          path: ./out/debug/x86_64-pc-linux-gnu

      - name: Download build artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-debug
          path: ./out/debug/x86_64-pc-linux-gnu

      - name: Generate Coverage
        run: make coverage-xml -j$(nproc) TARGET=x86_64-pc-linux-gnu PROFILE=debug
      - uses: forgejo/upload-artifact@v4
        with:
          name: coverage-report
          path: ./out/debug/x86_64-pc-linux-gnu/coverage.xml

  deploy:
    needs: [build, docs]
    runs-on: mpgn
    container: *ci-container
    steps:
      - uses: actions/checkout@v4

      - uses: forgejo/download-artifact@v4
        with:
          pattern: build-*
          path: ./out/

      - uses: forgejo/download-artifact@v4
        with:
          name: docs
          path: ./public/docs

      - name: Aggregate and Prepare Pages
        run: |
          # Note: Adjust paths based on how the recursive download structures the folder
          # Assuming ./out/ contains the build-* folders
          cd out/release/wasm32-unknown-emscripten
          rm -r bin/assets
          cp bin/* ../../../public/
          cd ../../..
          
          tar czf public/release.tar.gz out/release
          sha256sum public/release.tar.gz > public/release.tar.gz.sha256

      - uses: actions/git-pages@v2
        with:
          site: https://mpgn.pufferfish.page/tn-ppii
          server: pufferfish.page
          token: ${{ forge.token }}
          source: public/