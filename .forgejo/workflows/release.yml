name: Release pipeline

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

env:
  CI_CONTAINER: forgejo.puffer.fish/matthieu/base-images/tn-pp2i-ci-image-coder:latest@sha256:53cf2582bc2a423c4642b4c55b652f4fb292f73271803682a4afd3925a40c716

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make bear -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: forgejo/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out

  format:
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Format Check
        run: make check

  docs:
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docs
        run: make docs
      - uses: forgejo/upload-artifact@v4
        with:
          name: docs
          path: ./public/docs

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-linux-gnu, x86_64-w64-mingw32, wasm32-unknown-emscripten]
        profile: [debug, release]
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out
      - name: Tidy
        run: make tidy -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - name: Test
        run: make test -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - uses: forgejo/upload-artifact@v4
        with:
          name: test-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out

  coverage:
    needs: test
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    steps:
      - uses: actions/checkout@v4
      - name: Download test results
        uses: forgejo/download-artifact@v4
        with:
          name: test-x86_64-pc-linux-gnu-debug
          path: ./out
      - name: Download build artifacts
        uses: forgejo/download-artifact@v4
        with:
          name: build-x86_64-pc-linux-gnu-debug
          path: ./out
      - name: Generate Coverage
        run: make coverage-xml -j$(nproc) TARGET=x86_64-pc-linux-gnu PROFILE=debug
      - uses: forgejo/upload-artifact@v4
        with:
          name: coverage-report
          path: ./out/debug/x86_64-pc-linux-gnu/coverage.xml

  appimage:
    needs: build
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-linux-gnu]
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - uses: forgejo/download-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.profile }}
          path: ./out
      - name: Generate Coverage
        run: make appimage -j$(nproc) TARGET=${{ matrix.target }} PROFILE=${{ matrix.profile }}
      - run: |
          mkdir -p appimages
          cp ./out/${{ matrix.profile }}/${{ matrix.target }}/*.AppImage \
            appimages/Carcassonne-${{ matrix.target }}-${{ matrix.profile }}.AppImage
      - uses: forgejo/upload-artifact@v4
        with:
          name: appimage-${{ matrix.target }}-${{ matrix.profile }}
          path: ./appimages

  deploy:
    needs: [build, docs, appimage]
    runs-on: mpgn
    container: ${{ env.CI_CONTAINER }}
    steps:
      - uses: actions/checkout@v4

      - uses: forgejo/download-artifact@v4
        with:
          pattern: build-*
          path: ./out/
          merge-multiple: true
      - uses: forgejo/download-artifact@v4
        with:
          pattern: appimage-*
          path: ./appimages/
          merge-multiple: true
        
      - uses: forgejo/download-artifact@v4
        with:
          name: docs
          path: ./public/docs
        
      - name: Aggregate and Prepare Pages
        run: |
          rm -rf out/release/wasm32-unknown-emscripten/bin/assets
          cp out/release/wasm32-unknown-emscripten/bin/* public/
          cp appimages/* public/
          tar czf public/release.tar.gz out/release
          sha256sum public/release.tar.gz > public/release.tar.gz.sha256
      - uses: actions/git-pages@v2
        with:
          site: https://mpgn.pufferfish.page/tn-ppii
          server: pufferfish.page
          token: ${{ secrets.FORGEJO_TOKEN }}
          source: public/